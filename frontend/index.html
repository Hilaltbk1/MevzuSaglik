<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MevzuSağlık — Dijital Mevzuat Asistanı</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a1628;
            --navy2: #0f1e3a;
            --navy3: #162544;
            --teal: #0d9488;
            --teal2: #14b8a6;
            --teal3: #5eead4;
            --gold: #d4a853;
            --gold2: #f0c96b;
            --white: #f8f6f0;
            --muted: #94a3b8;
            --border: rgba(255,255,255,0.08);
            --card: rgba(255,255,255,0.04);
            --radius: 12px;
            --ff-display: 'Playfair Display', Georgia, serif;
            --ff-body: 'DM Sans', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--navy); color: var(--white); font-family: var(--ff-body); overflow-x: hidden; line-height: 1.6; }

        /* Navbar */
        nav { position: fixed; top:0; width:100%; z-index:100; padding:20px 40px; display:flex; justify-content:space-between; background:rgba(10,22,40,0.85); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); }
        .nav-logo { font-family: var(--ff-display); font-size:22px; font-weight:700; text-decoration:none; color:white; display:flex; align-items:center; gap:10px; }
        .nav-logo-icon { width:35px; height:35px; background:var(--teal); border-radius:8px; display:flex; align-items:center; justify-content:center; }

        /* Hero & Sections */
        section { padding: 100px 40px; max-width: 1200px; margin: 0 auto; }
        .hero { text-align: center; padding-top: 150px; }
        .hero-title { font-family: var(--ff-display); font-size: 64px; margin-bottom: 20px; }
        .accent { color: var(--teal2); }

        /* Buttons */
        .btn { padding: 12px 28px; border-radius: 8px; cursor: pointer; border: none; font-weight: 600; transition: 0.3s; text-decoration: none; display: inline-block; }
        .btn-primary { background: var(--teal); color: white; }
        .btn-gold { background: var(--gold); color: var(--navy); }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }

        /* Pricing */
        .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 50px; }
        .price-card { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
        .price-card.featured { border-color: var(--teal); background: rgba(13, 148, 136, 0.05); }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--navy2); padding: 40px; border-radius: 20px; width: 400px; border: 1px solid var(--border); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; border-radius: 8px; }

        /* App Page Layout */
        #app-page { display: none; height: 100vh; grid-template-columns: 280px 1fr; }
        .sidebar { background: var(--navy2); border-right: 1px solid var(--border); padding: 20px; display:flex; flex-direction:column; }
        .chat-main { display: flex; flex-direction: column; background: var(--navy); }
        .messages { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 20px; }
        .input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        textarea { flex: 1; background: var(--navy2); border: 1px solid var(--border); color: white; padding: 15px; border-radius: 10px; resize: none; }

        .message { max-width: 80%; padding: 15px; border-radius: 15px; }
        .message.user { align-self: flex-end; background: var(--teal); }
        .message.ai { align-self: flex-start; background: var(--navy3); border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="landing-page">
    <nav>
        <a href="#" class="nav-logo"><div class="nav-logo-icon">⚕</div> MevzuSağlık</a>
        <div>
            <button class="btn btn-ghost" onclick="showLogin('login')">Giriş Yap</button>
            <button class="btn btn-primary" onclick="showLogin('register')">Ücretsiz Başla</button>
        </div>
    </nav>

    <section class="hero">
        <h1 class="hero-title">Sağlık Mevzuatına <br><span class="accent">Yapay Zeka</span> Dokunuşu</h1>
        <p style="color:var(--muted); font-size:18px; margin-bottom:40px;">Hukuki metinler arasında kaybolmayın, asistanınıza sorun.</p>
        <button class="btn btn-gold" onclick="showLogin('register')">Hemen Dene</button>
    </section>

    <section id="fiyatlar">
        <h2 style="text-align:center; font-family:var(--ff-display); font-size:32px;">Planlar</h2>
        <div class="pricing-grid">
            <div class="price-card">
                <h3>Ücretsiz</h3>
                <p style="font-size:32px; margin:20px 0;">₺0</p>
                <button class="btn btn-ghost" onclick="showLogin('register')">Başla</button>
            </div>
            <div class="price-card featured">
                <h3>Pro</h3>
                <p style="font-size:32px; margin:20px 0;">₺299 <small style="font-size:14px;">/ay</small></p>
                <button class="btn btn-primary" onclick="buyPlan('pro')">Hemen Satın Al</button>
            </div>
        </div>
    </section>
</div>

<div id="app-page">
    <div class="sidebar">
        <div class="nav-logo" style="margin-bottom:30px;"><div class="nav-logo-icon">⚕</div> MevzuSağlık</div>
        <div id="sidebar-username" style="font-weight:600; margin-bottom:20px;">Kullanıcı</div>
        <button class="btn btn-primary" onclick="location.reload()" style="width:100%">Çıkış Yap</button>
    </div>
    <div class="chat-main">
        <div class="messages" id="chat-container">
            <div class="message ai">Merhaba! Size bugün sağlık mevzuatı konusunda nasıl yardımcı olabilirim?</div>
        </div>
        <div class="input-area">
            <textarea id="user-input" placeholder="Sorunuzu buraya yazın..." rows="1"></textarea>
            <button class="btn btn-primary" onclick="sendMessage()">Gönder</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="loginModal">
    <div class="modal">
        <h2 id="modal-title">Giriş Yap</h2>
        <input type="text" id="username" placeholder="Kullanıcı Adı">
        <input type="password" id="password" placeholder="Şifre">
        <button class="btn btn-primary" style="width:100%" onclick="handleAuth()">Devam Et</button>
        <p style="text-align:center; margin-top:15px; font-size:13px; cursor:pointer; color:var(--teal3)" onclick="toggleAuth()">Hesap Oluştur / Giriş Yap Değiştir</p>
    </div>
</div>

<script>
    const BACKEND_URL = window.location.origin;
    let currentUser = "";
    let authMode = "login";
    let pendingPlan = null;

    function showLogin(mode) {
        authMode = mode;
        document.getElementById('modal-title').innerText = mode === 'login' ? 'Giriş Yap' : 'Kayıt Ol';
        document.getElementById('loginModal').classList.add('show');
    }

    function toggleAuth() {
        showLogin(authMode === 'login' ? 'register' : 'login');
    }

    async function handleAuth() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const endpoint = authMode === 'login' ? '/auth/login' : '/auth/register';

        try {
            const res = await fetch(`${BACKEND_URL}${endpoint}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_name: u, password: p})
            });
            const data = await res.json();
            if(res.ok) {
                currentUser = u;
                document.getElementById('sidebar-username').innerText = u;
                document.getElementById('loginModal').classList.remove('show');
                document.getElementById('landing-page').style.display = 'none';
                document.getElementById('app-page').style.display = 'grid';

                if(pendingPlan) {
                    buyPlan(pendingPlan);
                    pendingPlan = null;
                }
            } else {
                alert(data.detail || "Hata oluştu");
            }
        } catch(e) { alert("Sunucu hatası"); }
    }

    async function buyPlan(plan) {
        if(!currentUser) {
            pendingPlan = plan;
            showLogin('register');
            return;
        }

        try {
            // Backend'e checkout isteği at
            const res = await fetch(`${BACKEND_URL}/billing/checkout?tenant_id=1&plan=${plan}`, {
                method: 'POST'
            });
            const data = await res.json();

            if(data.checkout_url) {
                // ÇÖZÜM: window.top kullanarak iframe engelini aşıyoruz
                // Eğer hala sorun olursa window.open(data.checkout_url, '_blank') deneyin.
                window.top.location.href = data.checkout_url;
            } else {
                alert("Ödeme bağlantısı alınamadı.");
            }
        } catch(e) {
            alert("Ödeme işlemi başlatılamadı.");
        }
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if(!text) return;

        appendMessage('user', text);
        input.value = "";

        try {
            const res = await fetch(`${BACKEND_URL}/chat`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text, user_id: currentUser})
            });
            const data = await res.json();
            appendMessage('ai', data.response);
        } catch(e) {
            appendMessage('ai', "Bir hata oluştu, lütfen tekrar deneyin.");
        }
    }

    function appendMessage(role, text) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerText = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>

</body>
</html>
